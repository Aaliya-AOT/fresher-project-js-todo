<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>To Do Application</title>
</head>
<body onload="loadTask()">
    <div class="main-container">
        <div class="task-add">
            <h2 class="main-title" id="head">My Tasks</h2>
            <button type="button" class="btn btn-primary add-btn" data-bs-toggle="modal" data-bs-target="#addModal">Add New Tasks</button>
        </div>
        <hr>
        <!-- Add Task Modal -->
        <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Add Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="task-form">
                            <div class="mb-3">
                                <label for="task-name" class="col-form-label">Title &Star;</label>
                                <input type="text" class="form-control" id="task-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="task-text" class="col-form-label">Description:</label>
                                <textarea class="form-control" id="task-text"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="task-date">Due Date</label>
                                <input type="date" class="form-control" id="task-date" required>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-outline-primary clear-btn" data-bs-dismiss="modal" >Cancel</button>
                                <button type="submit" class="btn btn-primary add-btn" aria-hidden="true" data-bs-toggle="modal" data-bs-dismiss="modal">Add Task</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="task-filter">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by task name" class="form-control">
                <img src="images/search.svg" class="search-icon">
            </div>            
            <div class="task-sort">
                <span> Sort by &colon;</span>
                <div class="dropdown">
                    <button type="button" class="btn btn-light dropdown-toggle" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">Newest First</button>
                    <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                        <li><a id="new" class="dropdown-item" href="#">Newest First</a></li>
                        <li><a id="old" class="dropdown-item" href="#">Oldest First</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <h6 class="active-task-title"> Active Tasks </h6>
        <div class="active-task" id="task-list">
        
        </div>
        <!-- Edit Task Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Edit Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="edit-task-form">
                            <div class="mb-3">
                                <label for="edit-task-name" class="col-form-label">Title &Star;</label>
                                <input type="text" class="form-control" id="edit-task-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="edit-task-text" class="col-form-label">Description:</label>
                                <textarea class="form-control" id="edit-task-text"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="edit-task-date">Due Date</label>
                                <input type="date" class="form-control" id="edit-task-date">
                            </div>
                            <input type="hidden" id="edit-task-id">
                            <div class="modal-footer">
                                <button type="button" class="btn btn-outline-primary clear-btn" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary add-btn" data-bs-toggle="modal">Update Task</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Delete Task Modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Delete Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>Are you sure you want to delete this task?</p>
                        <input type="hidden" id="delete-task-id">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-primary clear-btn" data-bs-dismiss="modal" >Cancel</button>
                        <button type="button" class="btn btn-danger add-btn" id="delete-task-button" data-bs-toggle="modal">Delete</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="completed-task-title">
            <h6 class="completed-task-heading"> Completed Tasks </h6>
        <button class="btn btn-outline-primary clear-btn" id="clear-btn">Clear Tasks</button>
        </div>
        <div class="completed-task" id="completed-task-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
